# DESIGN.md Spec Configuration
# This file is the single source of truth for the DESIGN.md format specification.
# Edit this file, then run `bun run spec:gen` to regenerate docs/spec.md.

version: alpha

units:
  - px
  - em
  - rem

sections:
  - canonical: Overview
    aliases:
      - Brand & Style
  - canonical: Colors
  - canonical: Typography
  - canonical: Layout
    aliases:
      - Layout & Spacing
  - canonical: Motion
    aliases:
      - Motion & Animation
  - canonical: Elevation & Depth
    aliases:
      - Elevation
  - canonical: Shapes
  - canonical: Iconography
    aliases:
      - Icons
  - canonical: Components
  - canonical: "Do's and Don'ts"

# Closed enum of supported icon libraries. `custom-svg` is the escape hatch.
icon_libraries:
  - lucide
  - material-symbols
  - heroicons
  - phosphor
  - custom-svg

# Closed enum of CSS easing keywords accepted alongside `cubic-bezier(...)`.
easing_keywords:
  - linear
  - ease
  - ease-in
  - ease-out
  - ease-in-out
  - step-start
  - step-end

typography_properties:
  - name: fontFamily
    type: string
  - name: fontSize
    type: Dimension
  - name: fontWeight
    type: number
    description: "A numeric font weight value (e.g., `400`, `700`). In YAML, this may be expressed as either a bare number or a quoted string; both are equivalent."
  - name: lineHeight
    type: "Dimension | number"
    description: "Accepts either a Dimension (e.g., `24px`, `1.5rem`) or a unitless number (e.g., `1.6`). A unitless number represents a multiplier of the element's `fontSize`, which is the recommended CSS practice."
  - name: letterSpacing
    type: Dimension
  - name: fontFeature
    type: string
    description: "configures\n  [`font-feature-settings`](https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Properties/font-feature-settings)."
  - name: fontVariation
    type: string
    description: "configures\n  [`font-variation-settings`](https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Properties/font-variation-settings)."

component_sub_tokens:
  - name: backgroundColor
    type: Color
  - name: textColor
    type: Color
  - name: typography
    type: Typography
  - name: rounded
    type: Dimension
  - name: padding
    type: Dimension
    description: "Accepts a single Dimension (`12px`) or a CSS shorthand of two-to-four Dimensions (`12px 16px`)."
  - name: size
    type: Dimension
  - name: height
    type: Dimension
  - name: width
    type: Dimension
  - name: border
    type: BorderShorthand
    description: "CSS shorthand `<width> <style> <color>` (e.g., `1px solid {colors.outline}`) or a Color/Dimension token reference."
  - name: borderColor
    type: Color
  - name: borderWidth
    type: Dimension
  - name: shadow
    type: ShadowValue
    description: "CSS shorthand `<offsetX> <offsetY> <blur> [<spread>] <color>` or a reference to an `{elevation.*}` token."
  - name: elevation
    type: ElevationLevel
    description: "Reference to an `{elevation.*}` token (semantic: resting, raised, overlay, modal)."
  - name: gap
    type: Dimension
  - name: iconSize
    type: "Dimension | \"auto\""
    description: "`auto` (the default) follows the nearest text size. Otherwise a Dimension or `{typography.*}` reference."
  - name: opacity
    type: Number
    description: "A unitless number between 0 and 1. Use for state (disabled, loading), not for tinting."
  - name: transition
    type: TransitionShorthand
    description: "CSS shorthand `<property> <duration> <easing>`. Until motion tokens land, literal values are accepted with a warning."
  - name: outline
    type: string
    description: "CSS outline shorthand (typically used in `focus-visible` state)."
  - name: boxShadow
    type: string
    description: "CSS box-shadow string. Prefer `shadow` + the `elevation.*` semantic tokens."
  - name: cursor
    type: string
    description: "CSS cursor keyword. Pair `cursor: not-allowed` with disabled-state contrast changes."

# Interactive component states. The vocabulary is opinionated but not closed
# (unknown states warn rather than error).
component_states:
  - name: hover
    interaction: pointer-only
    description: "Pointer hover; never the only affordance signal."
  - name: focus-visible
    interaction: keyboard
    required: true
    description: "Visible focus ring; never `outline: none` without a replacement."
  - name: active
    interaction: any
    description: "Currently being pressed or otherwise actuated."
  - name: pressed
    interaction: any
    description: "Toggle-style components in the on/selected position."
  - name: disabled
    interaction: any
    description: "Both reduced contrast AND `cursor: not-allowed`. Never opacity-only."
  - name: loading
    interaction: any
    description: "Component remains visible; indicates progress."

color_roles:
  - primary
  - secondary
  - tertiary
  - neutral

# Component kinds drive default behaviors (e.g., interactivity, required states).
# Adding a new kind = add it here; rules and exporters read this list.
component_kinds:
  - name: button
    interactive: true
  - name: input
    interactive: true
  - name: navigation
    interactive: true
  - name: container
    interactive: false
  - name: display
    interactive: false
  - name: overlay
    interactive: false

# Modifiers permitted in `noun-modifier` component names. The `naming-convention`
# rule treats anything else after the first hyphen as a candidate violation.
component_modifiers:
  # Style modifiers
  - primary
  - secondary
  - tertiary
  - danger
  - ghost
  - outline
  - subtle
  - bare
  - elevated
  # Interaction states
  - hover
  - focus
  - active
  - disabled
  # Input types — `input-text`, `input-number`, etc. form a closed set
  # mirroring HTML input types.
  - text
  - number
  - email
  - password
  - search

# Color value shapes
# ──────────────────
# In addition to a flat hex (`primary: "#1A1C1E"`), `colors` accepts two
# object-shaped forms that the model expands into flat tokens:
#
#   primary:                              # ramp: derives 50/100/.../900 in OKLCH
#     type: ramp
#     anchor: "#1A1C1E"
#     humanName: "Boston Clay"
#     description: "Driver for interaction."
#     steps: [50, 100, 200, 300, 400, 500, 600, 700, 800, 900]   # optional
#     pairs:                              # optional inline pair derivations
#       container: { bg: 100, fg: 800 }   # synthesizes primary-container / on-primary-container
#
#   surface-info:                         # pair: foreground/background bound together
#     type: pair
#     container:    "#E0F2FE"
#     onContainer:  "#0C4A6E"
#     minContrast:  4.5                   # WCAG AA body; 7 for AAA
#
# References resolve in dotted form (`{colors.primary.500}`,
# `{colors.surface-info.container}`) and via flat aliases (`{colors.primary}`
# for the anchor, `{colors.surface-info}` for the container, `{colors.on-surface-info}`
# for the on-container, `{colors.primary-container}` for ramp-derived pairs).

recommended_tokens:
  colors:
    - primary
    - secondary
    - tertiary
    - neutral
    - surface
    - on-surface
    - error
  typography:
    - headline-display
    - headline-lg
    - headline-md
    - body-lg
    - body-md
    - body-sm
    - label-lg
    - label-md
    - label-sm
  rounded:
    - none
    - sm
    - md
    - lg
    - xl
    - full
  motion-duration:
    - instant
    - fast
    - medium
    - slow
  motion-easing:
    - standard
    - decelerate
    - accelerate
    - emphasized
  iconography-sizes:
    - sm
    - md
    - lg
    - xl

examples:
  colors:
    primary: "#1A1C1E"
    secondary: "#6C7278"
    tertiary: "#B8422E"
    neutral: "#F7F5F2"
  elevation:
    resting: "0 1px 2px rgba(0,0,0,0.06)"
    raised: "0 4px 8px rgba(0,0,0,0.08)"
    overlay: "0 12px 24px rgba(0,0,0,0.12)"
    modal: "0 24px 48px rgba(0,0,0,0.16)"
  typography:
    h1:
      fontFamily: Public Sans
      fontSize: 48px
      fontWeight: 600
      lineHeight: 1.1
      letterSpacing: "-0.02em"
    body-md:
      fontFamily: Public Sans
      fontSize: 16px
      fontWeight: 400
      lineHeight: 1.6
    label-caps:
      fontFamily: Space Grotesk
      fontSize: 12px
      fontWeight: 500
      lineHeight: 1.0
      letterSpacing: "0.1em"
  motion:
    duration:
      instant: 0ms
      fast: 150ms
      medium: 250ms
      slow: 400ms
    easing:
      standard: "cubic-bezier(0.4, 0, 0.2, 1)"
      decelerate: "cubic-bezier(0, 0, 0.2, 1)"
      accelerate: "cubic-bezier(0.4, 0, 1, 1)"
      emphasized: "cubic-bezier(0.2, 0, 0, 1)"
    reducedMotion:
      duration: instant
      easing: standard
  iconography:
    library:
      name: lucide
      version: "0.451.0"
      style: outlined
    strokeWeight: 1.5px
    sizes:
      sm: 16px
      md: 20px
      lg: 24px
      xl: 32px
    defaultSize: md
    colorBinding: currentColor
  components:
    button-primary:
      backgroundColor: "{colors.primary-60}"
      textColor: "{colors.primary-20}"
      rounded: "{rounded.md}"
      padding: 12px
      transition: "opacity {motion.duration.fast} {motion.easing.standard}"
      interactive: true
      states:
        hover:
          backgroundColor: "{colors.primary-70}"
        focus-visible:
          outline: "2px solid {colors.primary-40}"
        active:
          opacity: 0.9
        disabled:
          backgroundColor: "{colors.surface-variant}"
          textColor: "{colors.on-surface-variant}"
          cursor: "not-allowed"
